<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0369a1">
<title>Wasserqualität Baden-Württemberg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
  :root {
    --blue-50:  #eff6ff;
    --blue-100: #dbeafe;
    --blue-500: #3b82f6;
    --blue-600: #2563eb;
    --blue-700: #1d4ed8;
    --sky-400:  #38bdf8;
    --sky-500:  #0ea5e9;
    --sky-600:  #0284c7;
    --sky-700:  #0369a1;
    --sky-900:  #0c4a6e;
    --green-50: #f0fdf4;
    --green-500:#22c55e;
    --green-600:#16a34a;
    --yellow-50:#fefce8;
    --yellow-400:#facc15;
    --yellow-500:#eab308;
    --red-50:   #fef2f2;
    --red-500:  #ef4444;
    --red-600:  #dc2626;
    --gray-50:  #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --radius-sm: 8px;
    --radius:    12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow:    0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,.10), 0 4px 8px rgba(0,0,0,.05);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #f0f7ff;
    color: var(--gray-800);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--sky-700) 0%, var(--sky-900) 100%);
    color: white;
    padding: 16px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .header-logo {
    width: 34px; height: 34px;
    background: rgba(255,255,255,.18);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-title { flex: 1 }
  .header-title h1 { font-size: 16px; font-weight: 700; line-height: 1.2 }
  .header-title p  { font-size: 11px; opacity: .72; margin-top: 1px }
  .header-btn {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.25);
    color: white;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s;
  }
  .header-btn:hover { background: rgba(255,255,255,.25) }

  .search-bar {
    display: flex; gap: 8px;
  }
  .search-input {
    flex: 1;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.3);
    color: white;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: background .15s;
  }
  .search-input::placeholder { color: rgba(255,255,255,.55) }
  .search-input:focus { background: rgba(255,255,255,.22) }
  .search-input-radius {
    width: 90px; flex: none;
  }
  /* Autocomplete-Dropdown */
  .ac-list {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 1200;
    background: white; border-radius: 10px; overflow: hidden;
    box-shadow: 0 8px 28px rgba(0,0,0,.22); display: none;
  }
  .ac-list.open { display: block }
  .ac-item {
    padding: 9px 14px; font-size: 13px; color: #1f2937; cursor: pointer;
    display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f1f5f9;
  }
  .ac-item:last-child { border-bottom: none }
  .ac-item:hover, .ac-item.active { background: #f0f9ff }
  .ac-item .ac-ico { font-size: 14px; flex: none }
  .ac-item .ac-sub { color: #94a3b8; font-size: 11px; margin-left: auto; white-space: nowrap }
  .search-btn {
    background: white;
    color: var(--sky-700);
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
    white-space: nowrap;
  }
  .search-btn:hover { opacity: .88 }

  /* ── MAIN ── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 16px 100px;
  }

  /* ── AMPEL ── */
  .ampel-card {
    background: white;
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
    overflow: hidden;
    position: relative;
  }
  .ampel-bg {
    position: absolute;
    inset: 0;
    opacity: .04;
    pointer-events: none;
  }
  .ampel-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .ampel-circle {
    width: 72px; height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
    position: relative;
  }
  .ampel-circle.gelb {
    background: linear-gradient(135deg, #fef08a, #fbbf24);
    box-shadow: 0 0 0 0 rgba(251,191,36,.4);
    animation: pulse-yellow 2.5s infinite;
  }
  .ampel-circle.gruen {
    background: linear-gradient(135deg, #86efac, #22c55e);
    box-shadow: 0 4px 14px rgba(34,197,94,.3);
  }
  .ampel-circle.rot {
    background: linear-gradient(135deg, #fca5a5, #ef4444);
    box-shadow: 0 0 0 0 rgba(239,68,68,.4);
    animation: pulse-red 2s infinite;
  }
  @keyframes pulse-yellow {
    0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,.5) }
    50%      { box-shadow: 0 0 0 12px rgba(251,191,36,0) }
  }
  @keyframes pulse-red {
    0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.5) }
    50%      { box-shadow: 0 0 0 12px rgba(239,68,68,0) }
  }
  .ampel-info { flex: 1 }
  .ampel-status-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--gray-500);
    margin-bottom: 3px;
  }
  .ampel-status-text {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .ampel-status-text.gelb { color: #b45309 }
  .ampel-status-text.gruen { color: var(--green-600) }
  .ampel-status-text.rot { color: var(--red-600) }
  .ampel-reason {
    font-size: 13px;
    color: var(--gray-600);
    line-height: 1.4;
  }
  .ampel-indicators {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .ampel-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: 20px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-700);
  }
  .ind-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ind-dot.gruen  { background: var(--green-500) }
  .ind-dot.gelb   { background: var(--yellow-500) }
  .ind-dot.rot    { background: var(--red-500) }
  .ind-dot.grau   { background: var(--gray-400) }

  /* ── TABS ── */
  .tabs {
    display: flex;
    align-items: center;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    margin-bottom: 16px;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 2px;
  }
  .tabs::-webkit-scrollbar { display: none }
  .tab-btn {
    flex-shrink: 0;
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-600);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .tab-btn:hover { border-color: var(--sky-400); color: var(--sky-600) }
  .tab-btn.active {
    color: white;
    box-shadow: 0 2px 8px rgba(2,132,199,.35);
  }
  /* Fluss-Gruppe: blaues Aktiv */
  .tab-group-fluss .tab-btn.active {
    background: var(--sky-600);
    border-color: var(--sky-600);
  }
  /* Seen-Gruppe: grünes Aktiv */
  .tab-group-seen .tab-btn.active {
    background: var(--green-600);
    border-color: var(--green-600);
    box-shadow: 0 2px 8px rgba(22,163,74,.35);
  }
  /* Übersicht: blaues Aktiv (Default) */
  #btn-uebersicht.active {
    background: var(--sky-600);
    border-color: var(--sky-600);
  }
  .tab-group {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }
  .tab-group-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .tab-group-label {
    font-size: 9.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    padding: 0 10px;
    white-space: nowrap;
  }
  .tab-group-fluss .tab-group-label { color: var(--sky-600) }
  .tab-group-seen  .tab-group-label { color: var(--green-600) }
  .tab-group-fluss {
    background: rgba(2,132,199,.06);
    border: 1px solid rgba(2,132,199,.18);
    border-radius: 12px;
    padding: 4px 5px;
  }
  .tab-group-seen {
    background: rgba(22,163,74,.06);
    border: 1px solid rgba(22,163,74,.18);
    border-radius: 12px;
    padding: 4px 5px;
  }
  .tab-group-fluss .tab-btn,
  .tab-group-seen  .tab-btn {
    border-color: transparent;
    background: transparent;
  }
  .tab-group-fluss .tab-btn:hover { background: rgba(2,132,199,.1); border-color: transparent }
  .tab-group-seen  .tab-btn:hover { background: rgba(22,163,74,.1); border-color: transparent }
  .tab-divider {
    width: 1px;
    height: 28px;
    background: var(--gray-200);
    flex-shrink: 0;
    margin: 0 2px;
  }

  /* ── PANEL ── */
  .panel { display: none }
  .panel.active { display: block }

  /* ── CARDS ── */
  .card {
    background: white;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-100);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--gray-100);
  }
  .card-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .card-icon.blue   { background: #dbeafe; }
  .card-icon.green  { background: #dcfce7; }
  .card-icon.orange { background: #ffedd5; }
  .card-icon.purple { background: #f3e8ff; }
  .card-icon.sky    { background: #e0f2fe; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--gray-800) }
  .card-sub   { font-size: 11px; color: var(--gray-500); margin-top: 1px }
  .card-body  { padding: 16px }
  .card-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--gray-100);
    font-size: 11px;
    color: var(--gray-500);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── MAP ── */
  #map {
    height: 220px;
    border-radius: 0;
    width: 100%;
  }
  @media(min-width:640px) { #map { height: 300px } }

  /* ── STAT GRID ── */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  @media(min-width:540px) {
    .stat-grid { grid-template-columns: repeat(4,1fr) }
  }
  .stat-card {
    background: white;
    border: 1px solid var(--gray-100);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow-sm);
  }
  .stat-label { font-size: 11px; color: var(--gray-500); font-weight: 500; margin-bottom: 4px }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--gray-900); line-height: 1.1 }
  .stat-unit  { font-size: 12px; color: var(--gray-500); font-weight: 400 }
  .stat-trend {
    font-size: 11px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .stat-trend.up   { color: var(--red-600) }
  .stat-trend.down { color: var(--green-600) }
  .stat-trend.flat { color: var(--gray-500) }
  .stat-time { font-size: 10px; color: var(--gray-400); margin-top: 6px }

  /* ── TABLE ── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px }
  .data-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: .04em;
    padding: 0 12px 10px;
    white-space: nowrap;
  }
  .data-table td {
    padding: 10px 12px;
    border-top: 1px solid var(--gray-100);
    color: var(--gray-700);
    vertical-align: middle;
  }
  .data-table tr:hover td { background: var(--gray-50) }
  .data-table td:first-child { font-weight: 500; color: var(--gray-900) }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge.gruen  { background: #dcfce7; color: #15803d }
  .badge.gelb   { background: #fef9c3; color: #854d0e }
  .badge.rot    { background: #fee2e2; color: #991b1b }
  .badge.grau   { background: var(--gray-100); color: var(--gray-600) }

  /* ── CHEM BARS ── */
  .chem-row {
    display: grid;
    grid-template-columns: 80px 1fr 90px 52px;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--gray-100);
  }
  .chem-row:last-child { border-bottom: none }
  .chem-name { font-size: 13px; font-weight: 600; color: var(--gray-800) }
  .chem-bar-wrap {
    height: 7px;
    background: var(--gray-200);
    border-radius: 10px;
    overflow: hidden;
  }
  .chem-bar { height: 100%; border-radius: 10px; transition: width .6s ease }
  .chem-val { font-size: 13px; color: var(--gray-700); text-align: right; white-space: nowrap }
  .chem-status { text-align: right }

  /* ── CHART ── */
  .chart-wrap { position: relative; height: 200px }
  @media(min-width:540px) { .chart-wrap { height: 240px } }

  /* ── PEGEL GAUGE ── */
  .gauge-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .gauge-svg-wrap { position: relative; width: 120px; height: 80px; flex-shrink: 0 }

  /* ── INFO BOXES ── */
  .info-box {
    background: var(--blue-50);
    border: 1px solid var(--blue-100);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--gray-700);
    margin-bottom: 12px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
    line-height: 1.5;
  }
  .info-box.warn {
    background: var(--yellow-50);
    border-color: #fde68a;
  }

  /* ── FOOTER ── */
  footer {
    background: var(--gray-800);
    color: var(--gray-400);
    font-size: 11px;
    padding: 20px 16px;
    line-height: 1.6;
  }
  footer a { color: var(--gray-400); text-decoration: underline }
  footer .sources-grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 6px 20px;
    margin-bottom: 12px;
  }
  @media(min-width:540px) {
    footer .sources-grid { grid-template-columns: repeat(3,1fr) }
  }
  footer .disclaimer {
    border-top: 1px solid var(--gray-700);
    padding-top: 12px;
    margin-top: 12px;
    color: var(--gray-500);
  }

  /* ── TIMESTAMP ── */
  .ts {
    font-size: 11px;
    color: var(--gray-400);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--gray-500);
    margin-bottom: 10px;
  }

  /* ── OVERVIEW GRID ── */
  .overview-grid {
    display: grid;
    gap: 14px;
  }
  @media(min-width:640px) {
    .overview-grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  /* ── SKELETON (loading) ── */
  .skel {
    background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%);
    background-size: 200% 100%;
    animation: skel-anim 1.5s infinite;
    border-radius: 6px;
  }
  @keyframes skel-anim {
    0% { background-position: 200% 0 }
    100% { background-position: -200% 0 }
  }

  /* ── MOBILE NAV ── */
  .mobile-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--gray-200);
    display: flex;
    align-items: stretch;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    z-index: 200;
    box-shadow: 0 -4px 16px rgba(0,0,0,.08);
  }
  .mobile-nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 4px 6px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gray-400);
    font-size: 9.5px;
    font-weight: 500;
    font-family: inherit;
    transition: color .15s;
    white-space: nowrap;
  }
  .mobile-nav-btn .nav-icon { font-size: 19px; line-height: 1 }
  .mnb-uebersicht.active { color: var(--sky-600) }
  .mnb-fluss.active       { color: var(--sky-700) }
  .mnb-seen.active        { color: var(--green-600) }
  .mobile-nav-group {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    border-left: 1px solid var(--gray-100);
  }
  .mobile-nav-grouplabel {
    font-size: 8.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    text-align: center;
    padding: 4px 6px 0;
  }
  .mobile-nav-fluss .mobile-nav-grouplabel { color: var(--sky-600) }
  .mobile-nav-seen  .mobile-nav-grouplabel { color: var(--green-600) }
  .mobile-nav-groupbtns {
    display: flex;
    flex: 1;
  }
  .mobile-nav-fluss {
    background: rgba(2,132,199,.04);
  }
  .mobile-nav-seen {
    background: rgba(22,163,74,.04);
    border-left: 1px solid var(--gray-100);
  }
  @media(min-width:768px) { .mobile-nav { display: none } }

  .update-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--green-50);
    color: var(--green-600);
    border: 1px solid #bbf7d0;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
  }
  .update-dot {
    width: 6px; height: 6px;
    background: var(--green-500);
    border-radius: 50%;
    animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1 } 50% { opacity: .3 }
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--gray-800);
    color: white;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    z-index: 9999;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0) }
  .toast.error { background: var(--red-600) }

  @media(min-width:768px) { .toast { bottom: 24px } }

  /* ── SEARCH LOADING ── */
  .search-btn:disabled { opacity: .6; cursor: not-allowed }

  /* ════════════════════════════════════════════════════════════════
     MAP-ZENTRISCHES LAYOUT (shadcn-Look, Vanilla-CSS)
     ════════════════════════════════════════════════════════════════ */
  :root {
    --background: 0 0% 100%;

  html, body { height: 100%; margin: 0; overflow: hidden; background: hsl(var(--background)); }

  /* Reusable shadcn-ish primitives */

  .sc-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 38px; padding: 0 14px; border-radius: calc(var(--radius) - 2px); border: 1px solid transparent; background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); font: 600 13px Inter, sans-serif; cursor: pointer; transition: opacity .15s, background .15s; white-space: nowrap; }
  .sc-btn:hover { opacity: .9; }

  .sc-btn-outline { background: hsl(var(--background)); color: hsl(var(--foreground)); border-color: hsl(var(--border)); }
  .sc-btn-outline:hover { background: hsl(var(--muted)); opacity: 1; }
  .sc-input { height: 38px; padding: 0 12px; border-radius: calc(var(--radius) - 2px); border: 1px solid hsl(var(--input)); background: hsl(var(--background)); font: 400 14px Inter, sans-serif; color: hsl(var(--foreground)); outline: none; transition: border-color .15s, box-shadow .15s; }
  .sc-input:focus { border-color: hsl(var(--ring)); box-shadow: 0 0 0 3px hsl(var(--ring) / 0.25); }

  .sc-badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 999px; font: 600 11px Inter, sans-serif; border: 1px solid hsl(var(--border)); background: hsl(var(--muted)); color: hsl(var(--foreground)); }
  .sc-badge.gruen { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }

  /* Topbar (schwebend) */
  .topbar { position: absolute; top: 14px; left: 14px; right: 14px; z-index: 1000; display: flex; gap: 10px; align-items: center; pointer-events: none; }

  /* Gesamt-Ampel als schwebende Card (unten links) */
  .ampel-fab { position: absolute; left: 14px; bottom: 22px; z-index: 900; width: 268px; max-width: calc(100vw - 28px); padding: 14px 16px; }
  .ampel-fab .row { display: flex; align-items: center; gap: 11px; }

  .ampel-dot-lg.gruen { background: #dcfce7; } .ampel-dot-lg.gelb { background: #fef9c3; }
  .ampel-dot-lg.rot { background: #fee2e2; } .ampel-dot-lg.grau { background: hsl(var(--muted)); }
  .ampel-fab .st { font: 700 15px Inter, sans-serif; }

  .ampel-fab .lbl { font: 500 10.5px Inter, sans-serif; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: .04em; }
  .ampel-fab .reason { margin-top: 9px; font-size: 11.5px; line-height: 1.5; color: hsl(var(--muted-foreground)); }

  @media (max-width: 720px) { .ampel-fab { left: 10px; right: 10px; bottom: 10px; width: auto; } }

  /* Map-Legende (schwebend, unten rechts) */

  .map-legend .li { display: flex; align-items: center; gap: 7px; margin: 2px 0; color: hsl(var(--foreground)); }
  @media (max-width: 720px) { .map-legend { display: none; } }

  /* Marker-Icons */
  .mk { border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.4); box-sizing: border-box; }

  .mk-guete::after { content: '🧪'; transform: rotate(-45deg); font-size: 10px; }

  /* Sidebar (rechts einschiebend) */
  .sidebar { position: absolute; top: 0; right: 0; height: 100%; width: 420px; max-width: 100vw; z-index: 1100;
    background: hsl(var(--background)); border-left: 1px solid hsl(var(--border)); box-shadow: var(--sc-shadow-lg);
    transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-head { display: flex; align-items: flex-start; gap: 10px; padding: 18px 18px 14px; border-bottom: 1px solid hsl(var(--border)); }

  .sidebar-close:hover { background: hsl(var(--muted)); }
  .sidebar-body { padding: 16px 18px 28px; overflow-y: auto; flex: 1; }
  .sb-section { margin-bottom: 20px; }
  .sb-section h3 { font: 600 11px Inter, sans-serif; text-transform: uppercase; letter-spacing: .05em; color: hsl(var(--muted-foreground)); margin: 0 0 9px; }
  .sb-kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .sb-kpi { border: 1px solid hsl(var(--border)); border-radius: calc(var(--radius) - 2px); padding: 10px 12px; }
  .sb-kpi .k { font: 500 10.5px Inter, sans-serif; color: hsl(var(--muted-foreground)); }
  .sb-kpi .v { font: 700 18px Inter, sans-serif; margin-top: 2px; }
  .sb-kpi .v span { font: 500 11px Inter, sans-serif; color: hsl(var(--muted-foreground)); }
  .sb-chart { border: 1px solid hsl(var(--border)); border-radius: calc(var(--radius) - 2px); padding: 12px; margin-bottom: 12px; }
  .sb-chart .ct { font: 600 12.5px Inter, sans-serif; margin-bottom: 2px; }

  @media (max-width: 560px) { .sidebar { width: 100vw; } }

<body>
<div id="app">

<script>
// ════════════════════════════════════════════════════════════════════════════
//  Wasserqualität Baden-Württemberg – map-zentrisch
//  Alle Pegel- / Güte- / Badegewässer-Stationen auf der Karte; Klick → Sidebar.
// ════════════════════════════════════════════════════════════════════════════

// ── UTILS ────────────────────────────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function fmtDate(ts) {
  if (!ts) return '–';
  const d = ts instanceof Date ? ts : new Date(ts);
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
}
function showToast(msg, type = 'info') {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast' + (type !== 'info' ? ' ' + type : '');
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 4000);
}
function proxyUrl(name) {
  const h = window.location.hostname, p = window.location.port;
  if (window.location.protocol === 'file:') throw new Error('Bitte "node server.js" oder "netlify dev" verwenden');
  if (p === '8080' || p === '8000') throw new Error('Statischer Server kann keine Proxy-Funktionen ausführen');
  if (p === '3000' || h.endsWith('.vercel.app')) return `/api/${name}`;
  return `/.netlify/functions/${name}`;
}

// ── STATE ────────────────────────────────────────────────────────────────────
let _currentLat = 48.93, _currentLon = 8.96, _radius = 20, _locName = '';
let _allPegel = [], _allGuete = [], _allLakes = [], _dwd = null;

// ── GEOCODING / FREITEXTSUCHE ─────────────────────────────────────────────────
const BW_VIEWBOX = '7.45,49.85,10.55,47.50';
const BW_BOUNDS = { latMin: 47.5, latMax: 49.85, lonMin: 7.45, lonMax: 10.55 };
function inBW(lat, lon) { return lat>=BW_BOUNDS.latMin && lat<=BW_BOUNDS.latMax && lon>=BW_BOUNDS.lonMin && lon<=BW_BOUNDS.lonMax; }

async function resolveLocation(query) {
  const q = (query || '').trim();
  if (!q) throw new Error('Bitte Ort, PLZ, Fluss oder See eingeben');
  if (/^\d{5}$/.test(q)) {
    const r = await fetch(`https://api.zippopotam.us/de/${encodeURIComponent(q)}`);
    if (r.ok) {
      const d = await r.json(); const p = d.places && d.places[0];
      const lat = p ? +p.latitude : NaN, lon = p ? +p.longitude : NaN;
      if (isFinite(lat) && isFinite(lon)) return { lat, lon, name: `${p['place name']} (${q})` };
    }
  }
  const hits = await nominatimSearch(q, 1);
  if (!hits.length) throw new Error(`„${q}" nicht gefunden`);
  return hits[0];
}
async function nominatimSearch(q, limit = 6) {
  const base = 'https://nominatim.openstreetmap.org/search';
  const common = `format=jsonv2&addressdetails=1&accept-language=de&limit=${limit}`;
  const tryFetch = async extra => {
    try { const r = await fetch(`${base}?q=${encodeURIComponent(q)}&${common}&${extra}`, { headers: { Accept: 'application/json' } });
      return r.ok ? await r.json() : []; } catch { return []; }
  };
  let arr = await tryFetch(`countrycodes=de&viewbox=${BW_VIEWBOX}&bounded=1`);
  if (!arr.length) arr = await tryFetch('countrycodes=de');
  return arr.map(h => ({ lat: +h.lat, lon: +h.lon, name: shortPlaceName(h), kind: h.type, klass: h.class }))
            .filter(h => isFinite(h.lat) && isFinite(h.lon));
}
function shortPlaceName(h) {
  const a = h.address || {};
  const place = a.city || a.town || a.village || a.municipality || a.county || '';
  const main = h.name || (h.display_name || '').split(',')[0];
  return (place && main && place !== main) ? `${main}, ${place}` : (main || place || (h.display_name||'').split(',')[0]);
}
function placeIcon(h) {
  if (h.klass === 'waterway' || /river|stream|canal/.test(h.kind||'')) return '🏞️';
  if (h.klass === 'water' || /lake|water|reservoir|pond/.test(h.kind||'')) return '🏊';
  if (/city|town|village|municipality|administrative/.test(h.kind||'')) return '🏙️';
  return '📍';
}

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────────────
let _acItems = [], _acActive = -1, _acTimer = null;
function initAutocomplete() {
  const input = document.getElementById('plzInput'), list = document.getElementById('acList');
  if (!input || !list) return;
  input.addEventListener('input', () => {
    const q = input.value.trim(); clearTimeout(_acTimer);
    if (q.length < 2 || /^\d{5}$/.test(q)) { closeAutocomplete(); return; }
    _acTimer = setTimeout(async () => renderAutocomplete(await nominatimSearch(q, 6)), 280);
  });
  input.addEventListener('keydown', e => {
    const open = list.classList.contains('open');
    if (e.key === 'Enter') { e.preventDefault(); (open && _acActive>=0) ? pickAc(_acActive) : (closeAutocomplete(), search()); return; }
    if (!open) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); moveAc(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveAc(-1); }
    else if (e.key === 'Escape') closeAutocomplete();
  });
  document.addEventListener('click', e => { if (!e.target.closest('.searchwrap')) closeAutocomplete(); });
}
function renderAutocomplete(hits) {
  const list = document.getElementById('acList'); _acItems = hits; _acActive = -1;
  if (!hits.length) { closeAutocomplete(); return; }
  list.innerHTML = hits.map((h,i) =>
    `<div class="ac-item" role="option" data-i="${i}" onclick="pickAc(${i})">
       <span class="ac-ico">${placeIcon(h)}</span><span>${escapeHtml(h.name)}</span>
       <span class="ac-sub">${escapeHtml(h.kind||'')}</span></div>`).join('');
  list.classList.add('open');
}
function moveAc(d) {
  const items = [...document.querySelectorAll('#acList .ac-item')]; if (!items.length) return;
  _acActive = (_acActive + d + items.length) % items.length;
  items.forEach((el,i) => el.classList.toggle('active', i === _acActive));
}
function pickAc(i) { const h = _acItems[i]; if (!h) return; document.getElementById('plzInput').value = h.name; closeAutocomplete(); search(); }
function closeAutocomplete() { const l = document.getElementById('acList'); if (l) { l.classList.remove('open'); l.innerHTML=''; } _acActive = -1; }

// ── STATUS / FARBEN ────────────────────────────────────────────────────────────
function badeStatus(lake) {
  if (lake.badeverbot) return { hex:'#ef4444', label:'Badeverbot', cls:'rot' };
  if (lake.ecoli != null) {
    if (lake.ecoli > 900 || (lake.enterok ?? 0) > 370) return { hex:'#ef4444', label:'Schlecht', cls:'rot' };
    if (lake.ecoli > 500 || (lake.enterok ?? 0) > 200) return { hex:'#eab308', label:'Mässig', cls:'gelb' };
    return { hex:'#22c55e', label:'Gut', cls:'gruen' };
  }
  const eu = (lake.euQualitaet||'').toLowerCase();
  if (eu.includes('poor')||eu.includes('schlecht')) return { hex:'#ef4444', label:'Schlecht', cls:'rot' };
  if (eu.includes('suffic')||eu.includes('ausreich')) return { hex:'#eab308', label:'Ausreichend', cls:'gelb' };
  if (eu.includes('good')||eu.includes('excellent')||eu.includes('gut')||eu.includes('ausgez')) return { hex:'#22c55e', label:'Gut', cls:'gruen' };
  return { hex:'#9ca3af', label:'Keine Daten', cls:'grau' };
}
function o2Color(mg) { if (mg < 4) return {cls:'rot',icon:'🔴',label:'kritisch'}; if (mg < 6) return {cls:'gelb',icon:'🟡',label:'mässig'}; return {cls:'gruen',icon:'🟢',label:'gut'}; }
function tempColor(c) { if (c > 28) return {cls:'rot',label:'sehr warm'}; if (c > 25) return {cls:'gelb',label:'warm'}; return {cls:'gruen',label:'unauffällig'}; }
function euColor(q) { const s=(q||'').toLowerCase();
  if (s.includes('poor')||s.includes('schlecht')) return 'rot';
  if (s.includes('suffic')||s.includes('ausreich')) return 'gelb';
  if (s.includes('good')||s.includes('excellent')||s.includes('gut')||s.includes('ausgez')) return 'gruen';
  return null; }

// ── FETCHER ────────────────────────────────────────────────────────────────────
async function fetchBadegewaesser(lat, lon, radiusKm) {
  const BASE = 'https://services-eu1.arcgis.com/1U6wr24jYkiSRBIK/arcgis/rest/services';
  const FIELDS = 'BW_ID,BADEGEWAESSERNAME,GEMEINDE_NAME,QUALITAET_LAUT_EU_2021,AKTUELL_BADEVERBOT,AKTUELL_MELDUNG';
  const attempts = [
    { where:'1=1', outFields:FIELDS, returnGeometry:'true', outSR:'4326', f:'json' },
    { where:'1=1', outFields:FIELDS, returnGeometry:'true', f:'json' },
  ];
  let data = null;
  for (const a of attempts) {
    try { const r = await fetch(`${BASE}/Badegewaesser/FeatureServer/0/query?${new URLSearchParams(a)}`);
      if (!r.ok) continue; const d = await r.json(); if (d.error || !Array.isArray(d.features)) continue; data = d; break; } catch {}
  }
  if (!data?.features?.length) return [];
  const coords = f => { const a=f.attributes||{}; const aLat=parseFloat(a.WGS84_Y), aLon=parseFloat(a.WGS84_X);
    if (isFinite(aLat)&&isFinite(aLon)&&aLat>40&&aLat<60) return [aLat,aLon];
    const gy=f.geometry?.y, gx=f.geometry?.x; if (isFinite(gy)&&isFinite(gx)&&gy>40&&gy<60) return [gy,gx]; return [null,null]; };
  const all = data.features.map(f => { const [la,lo]=coords(f); return { f, la, lo, distKm: la!=null?Math.round(haversine(lat,lon,la,lo)):null }; });
  const nearby = all.filter(x => x.distKm!=null && x.distKm<=radiusKm);
  const latest = {};
  if (nearby.length) {
    const ids = nearby.map(x => `'${x.f.attributes.BW_ID}'`).join(',');
    const mp = new URLSearchParams({ where:`BW_ID IN (${ids})`, outFields:'BW_ID,PROBE_DATUM,MESS_COLI,MESS_ENTEROK,TEMPERATUR', orderByFields:'PROBE_DATUM DESC', resultRecordCount:'500', f:'json' });
    try { const mr = await fetch(`${BASE}/Gesamt_UVB_Messdaten_Tabelle/FeatureServer/0/query?${mp}`); const md = await mr.json();
      for (const f of (md.features||[])) { const a=f.attributes; if (!latest[a.BW_ID]) latest[a.BW_ID]=a; } } catch {}
  }
  return all.map(({ f, la, lo, distKm }) => {
    const a = f.attributes, m = latest[a.BW_ID] || {};
    return {
      id:a.BW_ID, name:a.BADEGEWAESSERNAME||a.GEMEINDE_NAME||a.BW_ID, lat:la, lon:lo, distKm,
      euQualitaet:a.QUALITAET_LAUT_EU_2021||'',
      badeverbot: a.AKTUELL_BADEVERBOT===2 && /badeverbot|gesperrt|sperr|untersagt|nicht baden/i.test(a.AKTUELL_MELDUNG||'') && !/aufgehoben/i.test(a.AKTUELL_MELDUNG||''),
      meldung:a.AKTUELL_MELDUNG||'', ecoli:m.MESS_COLI??null, enterok:m.MESS_ENTEROK??null,
      temp:m.TEMPERATUR??null, probeDatum:m.PROBE_DATUM?new Date(m.PROBE_DATUM):null,
    };
  }).sort((a,b)=>(a.distKm??9999)-(b.distKm??9999));
}
async function loadPegelAll(lat, lon) {
  try { const r = await fetch(`${proxyUrl('pegel')}?limit=1000`); if (!r.ok) throw 0;
    const d = await r.json(); const all = d.ok&&Array.isArray(d.stations)?d.stations:[];
    return all.map(s => ({ ...s, distKm: Math.round(haversine(lat,lon,s.lat,s.lon)*10)/10 })).sort((a,b)=>a.distKm-b.distKm);
  } catch (e) { console.warn('Pegel:', e); return []; }
}
async function loadGueteList(lat, lon) {
  try { const r = await fetch(`${proxyUrl('niz')}?list=1`); if (!r.ok) throw 0;
    const d = await r.json(); const all = d.ok&&Array.isArray(d.stations)?d.stations:[];
    return all.map(s => ({ ...s, distKm: Math.round(haversine(lat,lon,s.lat,s.lon)*10)/10 })).sort((a,b)=>a.distKm-b.distKm);
  } catch (e) { console.warn('NIZ-Liste:', e); return []; }
}
async function loadGueteDetail(id) {

}
async function loadDWDLive(lat, lon) {
  try { const r = await fetch(`${proxyUrl('dwd')}?lat=${lat}&lon=${lon}`); if (!r.ok) throw 0; return await r.json(); }
  catch (e) { console.warn('DWD:', e); return null; }
}
async function pegelonlineNearby(lat, lon, radiusKm, limit = 1) {
  try { const r = await fetch(`https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations.json?latitude=${lat}&longitude=${lon}&radius=${radiusKm}&includeTimeseries=true&includeCurrentMeasurement=true`);
    if (!r.ok) return []; const arr = await r.json();
    return (Array.isArray(arr)?arr:[]).filter(s => (s.timeseries||[]).some(t => t.shortname==='W')).slice(0, limit);
  } catch { return []; }
}
async function pegelonlineHistory(uuid) {
  try { const r = await fetch(`https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations/${uuid}/W/measurements.json?start=P7D`);
    if (!r.ok) return null; const arr = await r.json();
    return Array.isArray(arr)&&arr.length ? arr.map(p => ({ dt:p.timestamp, w:+p.value })) : null; } catch { return null; }

let _map = null, _radiusLayer = null;
let _pegelLayer = null, _gueteLayer = null, _badeLayer = null;
function initMap() {
  if (_map) return;
  _map = L.map('map', { zoomControl: true, scrollWheelZoom: true }).setView([48.6, 9.0], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {

function updateMapRadius(lat, lon, radiusKm) {

  _map.setView([lat, lon], radiusKm<=10?12:radiusKm<=20?11:10);

function renderMapPegel(stations) {

      return `<div class="sb-kpi"><div class="k">${escapeHtml(p.label)}${extra}</div><div class="v">${escapeHtml(p.value)}${p.unit?` <span>${escapeHtml(p.unit)}</span>`:''}</div></div>`;

const CFONT = { family:'Inter, sans-serif', size:10 }, GC='rgba(0,0,0,.06)', TC='#94a3b8';
function drawSeriesChart(canvasId, ts, vals, unit, color, yOpts) {
  const el = document.getElementById(canvasId); if (!el) return;
  const ex = Chart.getChart(el); if (ex) ex.destroy();
  const labels = ts.map(t => { const d = new Date(t); return d.getHours()===0 ? d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) : ''; });
  new Chart(el, {
    type: 'line',
    data: { labels, datasets: [{ data: vals.map(v=>v==null?null:v), borderColor: color, backgroundColor: color+'22', fill:true, tension:.35, pointRadius:0, borderWidth:2, spanGaps:true }] },
    options: { responsive:true, maintainAspectRatio:false, animation:false,
      plugins: { legend:{display:false}, tooltip:{ callbacks:{ label:c=>c.raw+(unit?' '+unit:'') } } },
      scales: { x:{ grid:{color:GC}, ticks:{color:TC,font:CFONT,maxTicksLimit:7} },
                y:{ grid:{color:GC}, ticks:{color:TC,font:CFONT,callback:v=>v+(unit?' '+unit:'')}, ...(yOpts||{}) } } }
  });
}

// ── GESAMT-AMPEL (T1 Pegel · T2 Mikrobiell · T3 Chemie/O₂ · T4 Regen · T5 EU) ────
const AMPEL_W = { pegel:1.5, mikro:2.0, chemie:1.5, regen:1.0, eu:1.0 }, CS = { gruen:0, gelb:1, rot:2 };
function setChip(id, cls) { const el = document.getElementById(id); if (el) el.className = cls; }
function rainTrigger(s6, s24, s72) { if (s6>20||s24>40) return {cls:'rot',label:'Starkregen'}; if (s6>10||s24>20||s72>50) return {cls:'gelb',label:'erhöht'}; return {cls:'gruen',label:'kein Alarm'}; }

async function updateAmpel(lakes, pegel, dwd, gueteDetail, radiusKm) {
  let tPegel = pegel.some(s => s.w!=null && !s.stale) ? 'gruen' : null;
  setChip('ind-pegel', tPegel||'grau');

  let tMikro = null, mikroReason = '';
  const measured = lakes.filter(l => l.ecoli!=null);
  if (measured.length) {
    const scored = measured.map(l => { const ec=l.ecoli, en=l.enterok??0; let c='gruen';
      if (l.badeverbot||ec>900||en>370) c='rot'; else if (ec>500||en>200) c='gelb'; return {l,c}; });
    const worst = scored.reduce((a,b)=>CS[b.c]>CS[a.c]?b:a); tMikro = worst.c;
    if (worst.c!=='gruen') mikroReason = worst.l.badeverbot ? `${worst.l.name}: Badeverbot/Sperrung` : `${worst.l.name}: E.coli ${worst.l.ecoli}, Enterok. ${worst.l.enterok??'–'}`;
  }
  setChip('ind-mikro', tMikro||'grau');

  let tChemie = null, chemieReason = '';
  if (gueteDetail?.ok && gueteDetail.params?.length) {
    const o2 = gueteDetail.params.find(p=>p.key==='o2'&&p.valueNum!=null);
    const tp = gueteDetail.params.find(p=>p.key==='temp'&&p.valueNum!=null);
    if (o2) { const o=o2Color(o2.valueNum); tChemie=o.cls; if (o.cls!=='gruen') chemieReason=`${gueteDetail.station?.gewaesser||''}: Sauerstoff ${o2.value} mg/l (${o.label})`; }
    else if (tp) { const t=tempColor(tp.valueNum); tChemie=t.cls; if (t.cls!=='gruen') chemieReason=`${gueteDetail.station?.gewaesser||''}: Wassertemp. ${tp.value} °C (${t.label})`; }
  }
  setChip('ind-chemie', tChemie||'grau');

  let tRegen = null, regenReason = '';
  if (dwd?.ok && dwd.data?.length) { const sum=h=>dwd.data.slice(-h).reduce((s,x)=>s+(x.mm||0),0);
    const t = rainTrigger(sum(6),sum(24),sum(72)); tRegen=t.cls; if (t.cls!=='gruen') regenReason=`Niederschlag ${t.label} (${sum(24).toFixed(0)} mm/24h)`; }
  setChip('ind-regen', tRegen||'grau');

  let tEu = null;
  const near = lakes.filter(l=>l.distKm!=null&&l.distKm<=15).map(l=>euColor(l.euQualitaet)).filter(Boolean);
  if (near.length) tEu = near.reduce((a,b)=>CS[b]>CS[a]?b:a);
  else { const any = lakes.map(l=>euColor(l.euQualitaet)).filter(Boolean); if (any.length) tEu = any[0]; }
  setChip('ind-eu', tEu||'grau');

  const inds = { pegel:tPegel, mikro:tMikro, chemie:tChemie, regen:tRegen, eu:tEu };
  let score=0, weight=0, anyRed=false;
  for (const k in inds) { if (!inds[k]) continue; score+=CS[inds[k]]*AMPEL_W[k]; weight+=AMPEL_W[k]; if (inds[k]==='rot') anyRed=true; }
  let cls, label;
  if (!weight) { cls='grau'; label='Keine Daten'; }
  else if (anyRed) { cls='rot'; label='Erhöhtes Risiko'; }
  else if (score/weight > 0.3) { cls='gelb'; label='Mässig'; }
  else { cls='gruen'; label='Gut'; }
  document.getElementById('ampel-circle').className = 'ampel-dot-lg ' + cls;
  const txt = document.getElementById('ampel-text'); txt.className = 'st ' + cls; txt.textContent = label;
  document.getElementById('ampel-label').textContent = `${_locName||''} · ${radiusKm} km Umkreis`;
  const reasons = [mikroReason, chemieReason, regenReason].filter(Boolean);
  document.getElementById('ampel-reason').textContent = reasons.length ? reasons.join(' · ') : (cls==='gruen'?'Alle verfügbaren Indikatoren unauffällig.':'Bewertung aus verfügbaren Messwerten.');
  const bv = lakes.filter(l=>l.badeverbot).length;
  const now = new Date().toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('ampel-stand').textContent = (bv?`⚠ ${bv} Badeverbot/Warnung · `:'') + 'Stand ' + now;
}

// ── SUCHE / ORCHESTRIERUNG ──────────────────────────────────────────────────────
async function search() {
  const query = document.getElementById('plzInput').value.trim();
  const radius = Math.min(Math.max(parseInt(document.getElementById('radiusInput').value)||20, 5), 80);
  closeAutocomplete();
  if (!query) { showToast('Bitte Ort, PLZ, Fluss oder See eingeben', 'error'); return; }
  const btn = document.querySelector('.topbar .sc-btn'); const old = btn.textContent; btn.textContent='…'; btn.disabled=true;
  try {
    const loc = await resolveLocation(query);
    _currentLat=loc.lat; _currentLon=loc.lon; _radius=radius; _locName=loc.name;
    const u = new URL(window.location.href); ['plz','lat','lon'].forEach(k=>u.searchParams.delete(k));
    u.searchParams.set('q',query); u.searchParams.set('radius',String(radius)); history.replaceState({},'',u);
    document.getElementById('header-sub').textContent = `${loc.name} · ${radius} km`;
    if (_map) updateMapRadius(loc.lat, loc.lon, radius);
    if (!inBW(loc.lat, loc.lon)) showToast('Hinweis: Ort liegt außerhalb Baden-Württembergs – Datenlage ggf. unvollständig.', 'info');

    const [allLakes, allPegel, gueteList, dwd] = await Promise.all([
      fetchBadegewaesser(loc.lat, loc.lon, radius).catch(()=>[]),
      loadPegelAll(loc.lat, loc.lon),
      loadGueteList(loc.lat, loc.lon),
      loadDWDLive(loc.lat, loc.lon),
    ]);
    _allLakes=allLakes; _allPegel=allPegel; _allGuete=gueteList; _dwd=dwd;

    renderMapPegel(allPegel); renderMapGuete(gueteList); renderMapLakes(allLakes);

    // Radius-Teilmengen für die Ampel
    const lakesIn = allLakes.filter(l=>l.distKm!=null&&l.distKm<=radius);
    const pegelIn = allPegel.filter(s=>s.distKm!=null&&s.distKm<=radius);
    const nearGuete = gueteList.find(g=>g.distKm<=radius) || gueteList[0];
    const gueteDetail = nearGuete ? await loadGueteDetail(nearGuete.id) : null;
    updateAmpel(lakesIn, pegelIn, dwd, gueteDetail, radius);

    showToast(`${allPegel.length} Pegel · ${gueteList.length} Güte · ${allLakes.length} Badegewässer in BW`, 'success');
  } catch (e) { console.error(e); showToast('Fehler: ' + e.message, 'error'); }
  finally { btn.textContent = old; btn.disabled = false; }
}

function shareUrl() {
  const url = window.location.href, title = 'Wasserqualität ' + (_locName || 'Baden-Württemberg');
  if (navigator.share) navigator.share({ title, url });
  else if (navigator.clipboard) navigator.clipboard.writeText(url).then(() => showToast('Link kopiert!', 'success'));
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q') || params.get('plz') || '71665';
  const radius = params.get('radius') || '20';
  document.getElementById('plzInput').value = q;
  document.getElementById('radiusInput').value = radius;
  document.getElementById('radiusInput').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });
  initAutocomplete();
  setTimeout(() => { initMap(); search(); }, 60);
});

</script>
